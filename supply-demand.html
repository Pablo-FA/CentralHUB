function pCharge(pid){const now=new Date();return S.assigns.filter(a=>{const s=new Date(a.start_date),e=a.end_date?new Date(a.end_date):null;return a.profile_id===pid&&s<=now&&(!e||e>=now)&&!a.is_forecast;}).reduce((t,a)=>t+(a.chargeability||0),0);}

function getBenchSince(pid){
  const p=S.profiles.find(x=>x.id===pid);
  if(p&&p.bench_since_override)return new Date(p.bench_since_override);
  const now=new Date();
  const past=S.assigns.filter(a=>a.profile_id===pid&&a.end_date&&!a.is_forecast&&new Date(a.end_date)<now).sort((a,b)=>new Date(b.end_date)-new Date(a.end_date));
  if(past.length>0)return new Date(past[0].end_date);
  return null;
}

function getRisk(pid){
  const p=S.profiles.find(x=>x.id===pid);
  if(p&&p.risk_override)return p.risk_override;
  const charge=pCharge(pid);
  if(charge>=100)return null;
  const bs=getBenchSince(pid);
  if(!bs)return"low";
  const days=Math.floor((new Date()-bs)/(864e5));
  if(days>30)return"high";
  if(days>15)return"mid";
  return"low";
}

function riskBadge(r){if(!r)return"";const cfg={low:["bgreen","Low"],mid:["bamber","Mid"],high:["bred","High"]};const[cls,lbl]=cfg[r]||["bg","—"];return`<span class="bdg ${cls}" style="font-size:10px">${lbl}</span>`;}

function daysBench(pid){const bs=getBenchSince(pid);if(!bs)return 0;return Math.floor((new Date()-bs)/(864e5));}

function calcLogProyectos(){
  const now=new Date();const projects={};
  S.assigns.filter(a=>!a.is_forecast).forEach(a=>{
    if(!projects[a.project_name])projects[a.project_name]={name:a.project_name,profiles:new Set(),caps:new Set(),lcr_week:0,start:a.start_date,end:a.end_date||""};
    const p=S.profiles.find(x=>x.id===a.profile_id);
    if(p){projects[a.project_name].profiles.add(a.profile_id);projects[a.project_name].caps.add(p.capability||"");if(p.lcr)projects[a.project_name].lcr_week+=parseFloat(p.lcr)*(a.chargeability/100)*30;}
    if(a.start_date<projects[a.project_name].start)projects[a.project_name].start=a.start_date;
    if(a.end_date&&(!projects[a.project_name].end||a.end_date>projects[a.project_name].end))projects[a.project_name].end=a.end_date;
  });
  return Object.values(projects).map(p=>{
    const isActive=S.assigns.some(a=>a.project_name===p.name&&!a.is_forecast&&new Date(a.start_date)<=now&&(!a.end_date||new Date(a.end_date)>=now));
    return{name:p.name,count:p.profiles.size,caps:[...p.caps].filter(Boolean).join(", "),lcr_week:Math.round(p.lcr_week),active:isActive,start:p.start,end:p.end};
  }).sort((a,b)=>b.count-a.count);
}

function calcLogCaps(){
  const now=new Date();const rows=[];
  for(let i=11;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const lbl=d.toLocaleDateString("es-ES",{month:"short",year:"2-digit"});
    const entry={lbl};
    CAPS.forEach(cap=>{entry[cap]=S.profiles.filter(p=>p.capability===cap&&p.is_active&&(!p.hire_date||new Date(p.hire_date)<=d)).length;});
    rows.push(entry);
  }
  return rows;
}

function calcLogRoles(){
  const roles={};
  S.profiles.filter(p=>p.is_active).forEach(p=>{
    const role=p.role||"Sin rol";
    if(!roles[role])roles[role]={name:role,total:0,bench:0,caps:new Set()};
    roles[role].total++;if(pCharge(p.id)<100)roles[role].bench++;if(p.capability)roles[role].caps.add(p.capability);
  });
  return Object.values(roles).map(r=>({name:r.name,total:r.total,bench:r.bench,assigned:r.total-r.bench,pct:r.total>0?Math.round((r.total-r.bench)/r.total*100):0,caps:[...r.caps].join(", ")})).sort((a,b)=>b.total-a.total);
}

function capChart(rows){
  const maxV=Math.max(...rows.flatMap(r=>CAPS.map(c=>r[c]||0)),1);
  const W=640,PL=28,PR=8,PT=12,PB=24,CW=W-PL-PR,CH=160;
  const n=rows.length,xc=i=>PL+i*(CW/n)+(CW/n)/2,vy=v=>PT+CH-Math.round(v/maxV*CH);
  let grid="";for(let g=0;g<=4;g++){const v=Math.round(g*maxV/4),y=PT+CH-Math.round(g/4*CH);grid+=`<line x1="${PL}" y1="${y}" x2="${PL+CW}" y2="${y}" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>`;if(g>0)grid+=`<text x="${PL-4}" y="${y+3}" text-anchor="end" font-size="9" fill="#444">${v}</text>`;}
  const xlabels=rows.map((r,i)=>`<text x="${xc(i)}" y="${PT+CH+PB-4}" text-anchor="middle" font-size="9" fill="#444">${r.lbl}</text>`).join("");
  let lines="";
  CAPS.forEach(cap=>{const color=CAP_COLORS[cap]||"#666";const pts=rows.map((r,i)=>`${xc(i)},${vy(r[cap]||0)}`).join(" ");lines+=`<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" opacity="0.85"/>`;lines+=rows.map((r,i)=>`<circle cx="${xc(i)}" cy="${vy(r[cap]||0)}" r="2.5" fill="${color}" opacity="0.9"/>`).join("");});
  return`<svg viewBox="0 0 ${W} ${PT+CH+PB}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block"><line x1="${PL}" y1="${PT+CH}" x2="${PL+CW}" y2="${PT+CH}" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>${grid}${xlabels}${lines}</svg>`;
}

function projChart(data){
  const top=data.slice(0,10);const maxV=Math.max(...top.map(d=>d.count),1);
  const W=640,PL=160,PR=40,PT=8,barH=18,gap=10;const totalH=PT+top.length*(barH+gap);
  let bars="";
  top.forEach((d,i)=>{const y=PT+i*(barH+gap);const bw=Math.round(d.count/maxV*(W-PL-PR));const fill=d.active?"#7c6ee8":"#444";const op=d.active?0.8:0.45;const name=d.name.length>24?d.name.slice(0,23)+"…":d.name;bars+=`<rect x="${PL}" y="${y}" width="${Math.max(bw,2)}" height="${barH}" fill="${fill}" opacity="${op}" rx="2"/><text x="${PL-6}" y="${y+barH/2+4}" text-anchor="end" font-size="10" fill="${d.active?"#ccc":"#555"}">${name}</text><text x="${PL+bw+5}" y="${y+barH/2+4}" font-size="10" fill="#666">${d.count}</text>`;});
  return`<svg viewBox="0 0 ${W} ${totalH}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">${bars}</svg>`;
}

function roleChart(data){

function sortedDemands(list){

    }
    return 0;
  });

function sortedSupply(list){
  const sort=S.supplySort;if(!sort.length)return list;
  const now=new Date();
  return[...list].sort((a,b)=>{
    for(const{field,dir}of sort){
      let va,vb;
      if(field==="cargabilidad"){va=pCharge(a.id);vb=pCharge(b.id);}
      else if(field==="available"){va=100-pCharge(a.id);vb=100-pCharge(b.id);}
      else if(field==="days"){va=daysBench(a.id);vb=daysBench(b.id);}
      else if(field==="risk"){const rm={low:0,mid:1,high:2};va=rm[getRisk(a.id)]??-1;vb=rm[getRisk(b.id)]??-1;}
      else if(field==="bench_since"){const ba=getBenchSince(a.id),bb=getBenchSince(b.id);va=ba?ba.getTime():0;vb=bb?bb.getTime():0;}
      else if(field==="desde"||field==="hasta"){
        const getD=(p,type)=>{const active=S.assigns.filter(x=>x.profile_id===p.id&&!x.is_forecast&&new Date(x.start_date)<=now&&(!x.end_date||new Date(x.end_date)>=now));if(!active.length)return type==="hasta"?"0000":"9999";return type==="desde"?active.sort((x,y)=>new Date(x.start_date)-new Date(y.start_date))[0].start_date||"9999":active.sort((x,y)=>new Date(y.end_date||"9999")-new Date(x.end_date||"9999"))[0].end_date||"9999";};
        va=getD(a,field);vb=getD(b,field);
      }
      else if(field==="lcr"){va=parseFloat(a.lcr)||0;vb=parseFloat(b.lcr)||0;}
      else{va=(a[field]||"").toString().toLowerCase();vb=(b[field]||"").toString().toLowerCase();}
      if(va<vb)return dir==="asc"?-1:1;if(va>vb)return dir==="asc"?1:-1;
    }
    return 0;
  });
}

function supplyChart(rows){
  const maxB=Math.max(...rows.map(r=>r.bench),1);
  const W=640,PL=32,PR=8,PT=14,PB=28,CW=W-PL-PR,CH=160;
  const n=rows.length,bW=Math.floor(CW/n)-3;
  const bx=i=>PL+i*(CW/n)+1;
  const by=v=>PT+CH-Math.round(v/maxB*CH);
  let grid="";
  for(let g=0;g<=4;g++){
    const v=Math.round(g*maxB/4),y=PT+CH-Math.round(g/4*CH);
    grid+=`<line x1="${PL}" y1="${y}" x2="${PL+CW}" y2="${y}" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>`;
    if(g>0)grid+=`<text x="${PL-4}" y="${y+3}" text-anchor="end" font-size="9" fill="#444">${v}</text>`;
  }
  let bars="";
  rows.forEach((r,i)=>{
    const h=Math.max(r.bench>0?2:0,Math.round(r.bench/maxB*CH));
    const x=bx(i),y=PT+CH-h;
    const fill=r.pct>=25?"#ef4444":r.pct>=10?"#f59e0b":"#22c55e";
    bars+=`<rect x="${x}" y="${y}" width="${bW}" height="${h}" fill="${fill}" opacity="0.7" rx="2"/>`;
    if(r.bench>0)bars+=`<text x="${x+bW/2}" y="${y-2}" text-anchor="middle" font-size="8" fill="${fill}" font-weight="500">${r.bench}</text>`;
    bars+=`<text x="${x+bW/2}" y="${PT+CH+PB-4}" text-anchor="middle" font-size="9" fill="#444">${r.lbl}</text>`;
  });
  const maxP=Math.max(...rows.map(r=>r.pct),10);
  const pyv=v=>PT+CH-Math.round(v/Math.max(maxP,15)*CH);
  const pts=rows.map((r,i)=>`${bx(i)+bW/2},${pyv(r.pct)}`).join(" ");
  const dots=rows.map((r,i)=>`<circle cx="${bx(i)+bW/2}" cy="${pyv(r.pct)}" r="2.5" fill="rgba(124,110,232,0.8)"/>`).join("");
  return`<svg viewBox="0 0 ${W} ${PT+CH+PB}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">${grid}<line x1="${PL}" y1="${PT+CH}" x2="${PL+CW}" y2="${PT+CH}" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>${bars}<polyline points="${pts}" fill="none" stroke="rgba(124,110,232,0.5)" stroke-width="1.5" stroke-dasharray="4,2"/>${dots}</svg>`;
}

function calcLog(){
  const now=new Date();const rows=[];
  for(let i=11;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const lbl=d.toLocaleDateString("es-ES",{month:"short",year:"2-digit"});
    const active=S.profiles.filter(p=>p.is_active&&(!p.hire_date||new Date(p.hire_date)<=d));
    const bench=active.filter(p=>{
      const ch=S.assigns.filter(a=>{const s=new Date(a.start_date),e=a.end_date?new Date(a.end_date):null;return a.profile_id===p.id&&s<=d&&(!e||e>=d)&&!a.is_forecast;}).reduce((t,a)=>t+(a.chargeability||0),0);
      return ch<100;
    });
    rows.push({lbl,total:active.length,bench:bench.length,pct:active.length?Math.round(bench.length/active.length*100):0});
  }
  return rows;
}
function calcAge(d){if(!d)return"—";const dt=new Date(d),now=new Date();let y=now.getFullYear()-dt.getFullYear(),m=now.getMonth()-dt.getMonth();if(m<0){y--;m+=12;}return y>0?`${y}a ${m>0?m+"m":""}`:`${m>0?m+" mes":"<1 mes"}`;}

async function save(){const sv=async(k,v)=>{try{if(window.storage)await window.storage.set(k,JSON.stringify(v));else localStorage.setItem(k,JSON.stringify(v));}catch{}};await sv("sd_p3",S.profiles);await sv("sd_a3",S.assigns);await sv("sd_d3",S.demands);await sv("sd_cr3",S.customRoles);await sv("sd_b3",S.bajas);}

    <div class="fbar">

      ${sfddM("blv","levels","Nivel",LEVELS.map(l=>({val:l,label:l,sub:LN[l]})))}
      ${sfddM("brk","risks","Riesgo",[{val:"high",label:"High"},{val:"mid",label:"Mid"},{val:"low",label:"Low"}])}

      ${fCount>0?`<button class="btn btns" style="color:var(--t3);border-color:transparent" onclick="S.sf={q:'',caps:[],levels:[],risks:[],ctypes:[]};render()">× Limpiar</button>`:""}
    </div>
    <div class="tw" style="overflow-x:auto"><table style="min-width:700px">
      <thead><tr>
        ${thS("Nombre","name")}
        ${thS("Capability","capability")}
        ${thS("Level","level_accenture")}
        ${thS("Tipo","contract_type")}
        ${thS("Bench desde","bench_since")}

        ${thS("Riesgo","risk")}

        <th></th>
      </tr></thead>
      <tbody>${sorted.length===0?`<tr><td colspan="10" class="empty">Sin perfiles disponibles</td></tr>`:sorted.map(p=>{
        const avail=100-pCharge(p.id);const bs=getBenchSince(p.id);const days=daysBench(p.id);const risk=getRisk(p.id);const sub=p.contract_type==="Subcontractor";

          <td style="font-size:12px;color:var(--t2);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${lastNote?lastNote.text:""}</td>
          ${editBtn(p.id)}
        </tr>`;
      }).join("")}</tbody>
    </table></div>`;
  }

  if(S.supplyView==="bajas"){
    const formalBajaIds=new Set(S.bajas.map(b=>b.profile_id));
    const onLeaveProfiles=S.profiles.filter(p=>p.on_leave&&!formalBajaIds.has(p.id)).map(p=>({id:"ol_"+p.id,profile_id:p.id,type:"Sin registro formal",desde:"",hasta:"",comments:"Marcado como de baja en el perfil",profile:p,synthetic:true}));
    const bajas=[...S.bajas.map(b=>{const p=S.profiles.find(x=>x.id===b.profile_id);return{...b,profile:p};}).filter(b=>b.profile),...onLeaveProfiles];
    bajas.sort((a,b)=>new Date(b.desde||0)-new Date(a.desde||0));
    return`<div class="shdr" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:16px">${vt}<span class="scnt" style="margin-left:0">${bajas.length} bajas</span></div>
      <button class="btn btnp btns" onclick="openBM(null)">+ Nueva baja</button>
    </div>
    <div class="tw"><table>
      <thead><tr>
        ${thS("Nombre","name")}
        ${thS("Capability","capability")}
        ${thS("Level","level_accenture")}

        ${thS("Desde","desde")}
        ${thS("Hasta","hasta")}
        <th>Comentarios</th>
        <th></th>
      </tr></thead>
      <tbody>${bajas.length===0?`<tr><td colspan="8" class="empty">Sin bajas registradas</td></tr>`:bajas.map(b=>{
        const p=b.profile;const isActive=b.desde&&new Date(b.desde)<=now&&(!b.hasta||new Date(b.hasta)>=now);

      }).join("")}</tbody>

  }

  if(S.supplyView==="log"){
    const LOG_VIEWS=[["bench","Disponibles"],["proyectos","Proyectos"],["caps","Capabilities"],["roles","Roles"]];
    const lvt=`<div style="display:flex;gap:0;background:var(--bg3);border:1px solid var(--b);border-radius:6px;padding:2px;margin-bottom:20px">${LOG_VIEWS.map(([v,l])=>`<button style="padding:4px 14px;border-radius:5px;font-size:12px;cursor:pointer;border:none;background:${S.logView===v?"var(--bg2)":"transparent"};color:${S.logView===v?"var(--t)":"var(--t2)"};font-family:inherit;transition:all .15s" onclick="S.logView='${v}';render()">${l}</button>`).join("")}</div>`;
    if(S.logView==="bench"){
      const rows=calcLog();const last=rows[rows.length-1];
      return`<div class="shdr" style="margin-bottom:20px"><div style="display:flex;align-items:center;gap:16px">${vt}</div></div>${lvt}
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px"><div class="mcard"><div class="mlbl">Headcount hoy</div><div class="mval">${last.total}</div></div><div class="mcard"><div class="mlbl">Disponibles hoy</div><div class="mval" style="color:${last.bench>0?"var(--amber)":"var(--green)"}">${last.bench}</div><div class="msub">${last.pct}% del equipo</div></div><div class="mcard"><div class="mlbl">Mejor mes</div><div class="mval" style="color:var(--green)">${Math.min(...rows.map(r=>r.bench))}</div></div><div class="mcard"><div class="mlbl">Peor mes</div><div class="mval" style="color:var(--red)">${Math.max(...rows.map(r=>r.bench))}</div></div></div>
      <div style="background:var(--bg1);border:1px solid var(--b);border-radius:8px;padding:20px;margin-bottom:24px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div class="sect-lbl" style="margin:0">Evolución de disponibles</div><div style="font-size:11px;color:var(--t3)"><span style="color:var(--green)">▊</span><span style="color:var(--amber)">▊</span><span style="color:var(--red)">▊</span> Nº · <span style="color:var(--acc)">--- %</span></div></div>${supplyChart(rows)}</div>
      <div class="tw"><table><thead><tr><th>Mes</th><th>Headcount</th><th>Disponibles</th><th>% disponibles</th><th>Δ</th></tr></thead><tbody>${rows.map((r,i)=>{const prev2=i>0?rows[i-1]:null;const delta=prev2?r.bench-prev2.bench:null;const deltaCls=delta===null?"":delta>0?"bred":delta<0?"bgreen":"bg";const deltaLbl=delta===null?"—":delta>0?`+${delta}`:delta<0?`${delta}`:"=";const pctCls=r.pct>=25?"bred":r.pct>=10?"bamber":"bgreen";const isLast=i===rows.length-1;return`<tr${isLast?' style="font-weight:500"':""}><td>${r.lbl}${isLast?` <span class="bdg bacc" style="font-size:10px">hoy</span>`:""}</td><td style="color:var(--t2)">${r.total}</td><td><span style="font-weight:500;color:${r.bench>0?"var(--amber)":"var(--green)"}">${r.bench}</span></td><td><span class="bdg ${pctCls}" style="font-size:11px">${r.pct}%</span></td><td>${delta!==null?`<span class="bdg ${deltaCls}" style="font-size:11px">${deltaLbl}</span>`:"—"}</td></tr>`;}).join("")}</tbody></table></div>`;
    }
    if(S.logView==="proyectos"){
      const data=calcLogProyectos();const activeProj=data.filter(d=>d.active);const totalActive=activeProj.reduce((s,d)=>s+d.count,0);
      return`<div class="shdr" style="margin-bottom:20px"><div style="display:flex;align-items:center;gap:16px">${vt}</div></div>${lvt}
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px"><div class="mcard"><div class="mlbl">Activos</div><div class="mval">${activeProj.length}</div></div><div class="mcard"><div class="mlbl">Total</div><div class="mval" style="color:var(--t2)">${data.length}</div></div><div class="mcard"><div class="mlbl">Asignados</div><div class="mval">${totalActive}</div></div><div class="mcard"><div class="mlbl">Mayor proyecto</div><div style="font-size:14px;font-weight:500;margin-top:4px">${data[0]?data[0].name.split(" ").slice(0,3).join(" "):"—"}</div><div class="msub">${data[0]?data[0].count+" perfiles":""}</div></div></div>
      <div style="background:var(--bg1);border:1px solid var(--b);border-radius:8px;padding:20px;margin-bottom:24px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div class="sect-lbl" style="margin:0">Headcount por proyecto</div><div style="font-size:11px;color:var(--t3)"><span style="color:var(--acc)">■ Activo</span> · <span style="color:#444">■ Histórico</span></div></div>${projChart(data)}</div>
      <div class="tw"><table><thead><tr><th>Proyecto</th><th>Estado</th><th>Perfiles</th><th>Capabilities</th><th>LCR/mes</th><th>Inicio</th><th>Fin</th></tr></thead><tbody>${data.map(d=>`<tr><td style="font-weight:500">${d.name}</td><td><span class="bdg ${d.active?"bgreen":"bg"}" style="font-size:10px">${d.active?"Activo":"Cerrado"}</span></td><td>${d.count}</td><td style="font-size:12px;color:var(--t2)">${d.caps}</td><td style="font-size:12px;color:var(--t2)">${d.lcr_week?d.lcr_week+"€":"—"}</td><td style="font-size:12px;color:var(--t2)">${fds(d.start)}</td><td style="font-size:12px;color:var(--t2)">${d.end?fds(d.end):"—"}</td></tr>`).join("")}</tbody></table></div>`;
    }
    if(S.logView==="caps"){
      const rows=calcLogCaps();const last=rows[rows.length-1];
      return`<div class="shdr" style="margin-bottom:20px"><div style="display:flex;align-items:center;gap:16px">${vt}</div></div>${lvt}
      <div style="background:var(--bg1);border:1px solid var(--b);border-radius:8px;padding:20px;margin-bottom:24px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div class="sect-lbl" style="margin:0">Evolución headcount por capability</div><div style="display:flex;flex-wrap:wrap;gap:10px">${CAPS.map(cap=>`<span style="font-size:11px;color:${CAP_COLORS[cap]}">${cap} ${last[cap]||0}</span>`).join("")}</div></div>${capChart(rows)}</div>
      <div class="tw"><table><thead><tr><th>Capability</th><th>Headcount</th><th>Disponibles</th><th>Cargabilidad media</th><th>Δ</th></tr></thead><tbody>${CAPS.map(cap=>{const curr=S.profiles.filter(p=>p.capability===cap&&p.is_active);const bench=curr.filter(p=>pCharge(p.id)<100).length;const avg=curr.length?Math.round(curr.reduce((s,p)=>s+pCharge(p.id),0)/curr.length):0;const prev=rows[rows.length-2];const delta=prev?(last[cap]||0)-(prev[cap]||0):null;const deltaCls=delta===null?"":delta>0?"bgreen":delta<0?"bred":"bg";const deltaLbl=delta===null?"—":delta>0?`+${delta}`:delta<0?`${delta}`:"=";return`<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${CAP_COLORS[cap]};margin-right:8px"></span><span style="font-weight:500">${cap}</span></td><td>${curr.length}</td><td><span class="bdg ${bench>0?"bamber":"bgreen"}">${bench}</span></td><td><div class="cbar"><div class="ctrack" style="min-width:80px"><div class="cfill" style="width:${Math.min(avg,100)}%;background:${cc(avg)}"></div></div><span style="font-size:12px">${avg}%</span></div></td><td>${delta!==null?`<span class="bdg ${deltaCls}" style="font-size:11px">${deltaLbl}</span>`:"—"}</td></tr>`;}).join("")}</tbody></table></div>`;
    }
    if(S.logView==="roles"){
      const data=calcLogRoles();
      return`<div class="shdr" style="margin-bottom:20px"><div style="display:flex;align-items:center;gap:16px">${vt}</div></div>${lvt}
      <div style="background:var(--bg1);border:1px solid var(--b);border-radius:8px;padding:20px;margin-bottom:24px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div class="sect-lbl" style="margin:0">Headcount por rol</div><div style="font-size:11px;color:var(--t3)"><span style="color:var(--acc)">■ asignado</span> · fondo = total</div></div>${roleChart(data)}</div>
      <div class="tw"><table><thead><tr><th>Rol</th><th>Total</th><th>Asignados</th><th>Disponibles</th><th>% asignación</th><th>Capabilities</th></tr></thead><tbody>${data.map(r=>{const pctCls=r.pct>=80?"bgreen":r.pct>=50?"bamber":"bred";return`<tr><td style="font-weight:500">${r.name}</td><td>${r.total}</td><td>${r.assigned}</td><td><span class="bdg ${r.bench>0?"bamber":"bgreen"}">${r.bench}</span></td><td><span class="bdg ${pctCls}" style="font-size:11px">${r.pct}%</span></td><td style="font-size:12px;color:var(--t2)">${r.caps}</td></tr>`;}).join("")}</tbody></table></div>`;
    }
  }
  return"";
}
// ── DEMAND ────────────────────────────────────────────────────────────────
function tDemand(){
  const f=S.df2;
  const allClients=[...new Set(S.demands.map(d=>d.client).filter(Boolean))].sort();
  const fCount=f.statuses.length+f.caps.length+f.clients.length;

  // demand filter dropdowns reuse tSF-like logic
  const dfdd=(key,field,label,items)=>{const arr=f[field];const cnt=arr.length;return`<div class="fdd"><button class="fdd-btn${cnt>0?" active":""}" id="fddb-d${key}" onclick="tFDD('d${key}',event)">${label}${cnt>0?` <span class="fdd-cnt">${cnt}</span>`:""}<span class="fdd-arrow">▾</span></button><div class="fdd-panel" id="fddp-d${key}">${items.map(it=>`<div class="fdd-item" onclick="tDF('${field}','${it.replace(/'/g,"\\'")}');event.stopPropagation()"><div class="fdd-chk${arr.includes(it)?" on":""}"></div><span class="fdd-label">${it}</span></div>`).join("")}${cnt>0?`<div class="fdd-divider"></div><div class="fdd-clr" onclick="S.df2.${field}=[];render();event.stopPropagation()">× Limpiar</div>`:""}</div></div>`;};

  const thD=(label,field)=>`<th onclick="dSortBy('${field}',event)" title="Shift+click para orden secundario" style="cursor:pointer">${label}${dSA(field)}</th>`;

  let fd=S.demands.filter(d=>{
    if(f.statuses.length&&!f.statuses.includes(d.status))return false;
    if(f.caps.length&&!f.caps.includes(d.capability))return false;
    if(f.clients.length&&!f.clients.includes(d.client))return false;
    return true;
  });
  fd=sortedDemands(fd);

  return`<div class="shdr" style="margin-bottom:16px">
    <div><span class="scnt" style="margin-left:0">${fd.length} de ${S.demands.length} peticiones</span></div>
    <button class="btn btnp btns" onclick="openDM(null)">+ Nueva petición</button>
  </div>
  <div class="fbar">
    ${dfdd("st","statuses","Estado",STATUSES)}
    ${dfdd("cap","caps","Capability",CAPS)}
    ${dfdd("cli","clients","Cliente",allClients)}
    ${fCount>0?`<button class="btn btns" style="color:var(--t3);border-color:transparent" onclick="S.df2={statuses:[],caps:[],clients:[]};render()">× ${fCount}</button>`:""}
  </div>
  <div class="tw" style="overflow-x:auto"><table style="min-width:1100px">
    <thead><tr>
      ${thD("Cliente","client")}
      ${thD("Proyecto","project_reference")}
      ${thD("Inicio","start_date")}
      ${thD("Duración","duration_weeks")}
      ${thD("Perfil","role")}
      ${thD("Tipo","contract_type")}
      ${thD("Carga","chargeability_required")}
      ${thD("Estado","status")}
      <th>Perfil propuesto</th>
      <th>Comentarios</th>
    </tr></thead>
    <tbody>${fd.length===0?`<tr><td colspan="10" class="empty">Sin peticiones con los filtros actuales</td></tr>`:fd.map(d=>{
      const lastNote=(d.notes||[]).slice(-1)[0];
      const sub=d.contract_type==="Subcontractor";
      return`<tr onclick="openDM('${d.id}')" style="cursor:pointer">
        <td style="font-weight:500">${d.client||"—"}</td>
        <td style="font-size:12px;color:var(--t2)">${d.project_reference||"—"}</td>
        <td style="font-size:12px;color:var(--t2)">${d.start_date?new Date(d.start_date).toLocaleDateString("es-ES",{day:"2-digit",month:"short",year:"numeric"}):"—"}</td>
        <td style="font-size:12px;color:var(--t2)">${d.duration_weeks?d.duration_weeks+"sem":"—"}</td>
        <td><div style="font-weight:500;font-size:13px">${d.role||"—"}</div><div style="font-size:11px;color:var(--t3)">${d.seniority||""} · ${d.capability||""}</div></td>
        <td><span class="bdg ${sub?"bamber":"bgreen"}" style="font-size:10px">${d.contract_type||"Interno"}</span></td>
        <td style="font-size:12px">${d.chargeability_required?d.chargeability_required+"%":"—"}</td>
        <td><span class="bdg ${scol(d.status)}">${d.status||"Vacío"}</span></td>
        <td style="font-size:12px;color:var(--t2)">${d.proposed_profile||'<span style="color:var(--t3)">Sin propuesta</span>'}</td>
        <td style="font-size:12px;color:var(--t2);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${lastNote?lastNote.text:""}</td>
      </tr>`;
    }).join("")}</tbody>
  </table></div>`;
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────
function tDash(){const bench=S.profiles.filter(p=>pCharge(p.id)===0).length;const avg=S.profiles.length?Math.round(S.profiles.reduce((s,p)=>s+pCharge(p.id),0)/S.profiles.length):0;const openD=S.demands.filter(d=>d.status==="Abierta").length;const byS=STATUSES.reduce((a,s)=>{a[s]=S.demands.filter(d=>d.status===s).length;return a},{});const byCap=S.profiles.reduce((a,p)=>{const c=p.capability||"?";if(!a[c])a[c]={t:0,b:0,ch:0};a[c].t++;const ch=pCharge(p.id);if(ch===0)a[c].b++;a[c].ch+=ch;return a},{});const byLoc=S.profiles.reduce((a,p)=>{if(p.location)a[p.location]=(a[p.location]||0)+1;return a},{});const intN=S.profiles.filter(p=>p.contract_type!=="Subcontractor").length,subN=S.profiles.filter(p=>p.contract_type==="Subcontractor").length;return`<div class="shdr"><span class="stitle">Dashboard</span></div><div class="mgrid"><div class="mcard"><div class="mlbl">Perfiles activos</div><div class="mval">${S.profiles.length}</div><div class="msub">Internos: ${intN} · Sub: ${subN}</div></div><div class="mcard"><div class="mlbl">En banquillo</div><div class="mval" style="color:${bench>0?"var(--amber)":"var(--green)"}">${bench}</div><div class="msub">${S.profiles.length>0?Math.round(bench/S.profiles.length*100):0}% del equipo</div></div><div class="mcard"><div class="mlbl">Cargabilidad media</div><div class="mval" style="color:${avg>=80?"var(--green)":avg>=50?"var(--amber)":"var(--red)"}">${avg}%</div></div><div class="mcard"><div class="mlbl">Demanda abierta</div><div class="mval" style="color:${openD>0?"var(--acc)":"var(--t)"}">${openD}</div><div class="msub">sin cubrir</div></div></div><div class="sect-lbl">Demand por estado</div><div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px">${STATUSES.map(s=>`<div class="mcard" style="flex:1 1 90px;padding:14px 16px"><div class="mlbl" style="margin-bottom:4px">${s}</div><div style="font-size:22px;font-weight:500">${byS[s]||0}</div></div>`).join("")}</div><div class="sect-lbl">Por capability</div><div class="tw" style="margin-bottom:28px"><table><thead><tr><th>Capability</th><th>Perfiles</th><th>Banquillo</th><th>Cargabilidad media</th></tr></thead><tbody>${Object.entries(byCap).map(([cap,d])=>{const ca=Math.round(d.ch/d.t);return`<tr><td style="font-weight:500">${cap}</td><td>${d.t}</td><td><span class="bdg ${d.b>0?"bamber":"bgreen"}">${d.b}</span></td><td><div class="cbar"><div class="ctrack" style="min-width:80px"><div class="cfill" style="width:${Math.min(ca,100)}%;background:${cc(ca)}"></div></div><span style="font-size:12px">${ca}%</span></div></td></tr>`}).join("")}</tbody></table></div><div class="sect-lbl">Por ubicación</div><div style="display:flex;gap:10px;flex-wrap:wrap">${Object.entries(byLoc).sort((a,b)=>b[1]-a[1]).map(([loc,n])=>`<div class="mcard" style="flex:1 1 100px;padding:14px 16px"><div class="mlbl" style="margin-bottom:4px">${loc}</div><div style="font-size:22px;font-weight:500">${n}</div></div>`).join("")}</div>`;}

// ── PROFILE MODAL ─────────────────────────────────────────────────────────
function openPM(id,defTab){
  currentPid=id;
  modalEditMode=!id; // New profile = edit mode; existing = read mode
  modalTabState=defTab||"general";
  const p=id?S.profiles.find(x=>x.id===id):null;
  editSkills=p?p.skills.map(s=>({...s})):[];
  editData=p?{...p}:{name:"",eid:"",capability:"",role:"",seniority:"Mid",level_accenture:"CL9",contract_type:"Interno",location:"",people_lead:"",lcr:"",current_project:"",next_assignment:"",employee_number:"",hire_date:"",agency:"",notes:"",performance_notes:""};
  renderPM();
}

function switchMTab(t){
  if(modalEditMode)captureEditData();
  modalTabState=t;
  renderPM();
}
function startEdit(){modalEditMode=true;renderPM();}
function cancelEdit(){modalEditMode=false;const p=currentPid?S.profiles.find(x=>x.id===currentPid):null;editSkills=p?p.skills.map(s=>({...s})):[];editData=p?{...p}:{};renderPM();}

function captureEditData(){
  const g=(id,def="")=>{const el=document.getElementById(id);return el?el.value:def;};
  const getTgg=gid=>{const b=document.querySelector(`#${gid} .tgb.on`);return b?b.textContent:editData[gid==="tgg-sen"?"seniority":gid==="tgg-lvl"?"level_accenture":"contract_type"]||"";};
  Object.assign(editData,{name:g("pn"),eid:g("peid"),capability:g("pcap"),role:g("prol")==="__new__"?"":g("prol"),seniority:getTgg("tgg-sen"),level_accenture:getTgg("tgg-lvl"),contract_type:getTgg("tgg-ct"),location:g("ploc"),people_lead:g("ppl"),lcr:g("pl"),current_project:g("pcp"),next_assignment:g("pna"),employee_number:g("penum"),hire_date:g("phire"),agency:g("pagency"),notes:g("pno"),performance_notes:g("pperf")});
}

function renderPM(){
  const p=currentPid?S.profiles.find(x=>x.id===currentPid):null;
  const d=modalEditMode?editData:(p||{});
  const sub=d.contract_type==="Subcontractor";
  const tabs=[["asignacion","Asignación"],["general","General"],["skills","Skills"],["detail","Detalle"],["history","Historial"]];
  document.getElementById("mroot").innerHTML=`
  <div class="ov" id="pov" onclick="if(event.target.id==='pov')cm()">
  <div class="modal">
    <div class="mhdr">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="av" style="width:40px;height:40px;font-size:13px">${(p||d).name?ini((p||d).name||"?"):"+"}</div>
        <div>
          <div style="font-size:16px;font-weight:500">${(p||d).name||"Nuevo perfil"}</div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:3px">
            <span style="font-size:12px;color:var(--t2)">${(p||d).role||"—"} · ${(p||d).capability||"—"}</span>
            <span class="bdg bg" style="font-size:10px">${(p||d).level_accenture||"—"}</span>

    </div>
    <div class="mbdy" style="padding-top:0">
      <div class="mtabs">${tabs.filter(([t])=>t!=="history"||p).map(([t,l])=>`<div class="mtab${modalTabState===t?" on":""}" onclick="switchMTab('${t}')">${l}</div>`).join("")}</div>
      ${modalTabState==="asignacion"&&p?asigTab(p):""}
      ${modalTabState==="general"?genTab(d):""}
      ${modalTabState==="skills"?skillsTab(d):""}
      ${modalTabState==="detail"?detailTab(d):""}
      ${modalTabState==="history"&&p?histTab(p):""}

      <div style="flex:1"></div>
      ${modalEditMode
        ?`<button class="btn btns" onclick="cancelEdit()">${p?"Cancelar":"Cerrar"}</button><button class="btn btnp btns" onclick="saveP()">Guardar</button>`
        :`${p?`<button class="btn btns btnd" onclick="archP('${p.id}')">Archivar</button>`:""}<button class="btn btnp btns" onclick="startEdit()">Editar</button>`
      }
    </div>
  </div></div>`;

  // Wire supply-tab window functions after DOM render
  window._prRisk=async(pid,r)=>{
    const rv=r==="auto"?null:r;
    S.profiles=S.profiles.map(pr=>pr.id===pid?{...pr,risk_override:rv}:pr);
    await save();render();currentPid=pid;renderPM();
  };
  window._prAddNote=async(pid)=>{
    const txt=document.getElementById("pr-note-inp")?.value?.trim();if(!txt)return;
    const now2=new Date();
    const activeA=S.assigns.filter(a=>{const s=new Date(a.start_date),e=a.end_date?new Date(a.end_date):null;return a.profile_id===pid&&s<=now2&&(!e||e>=now2)&&!a.is_forecast;}).sort((a,b)=>b.chargeability-a.chargeability);
    const mainA=activeA[0];
    const note={id:uid(),ts:now2.toISOString(),text:txt,assignment_id:mainA?.id||"manual",project:mainA?.project_name||"—"};
    S.profiles=S.profiles.map(pr=>pr.id===pid?{...pr,supply_notes:[...(pr.supply_notes||[]),note]}:pr);
    await save();render();currentPid=pid;renderPM();
  };
  window._prDelNote=async(pid,nid)=>{
    S.profiles=S.profiles.map(pr=>pr.id===pid?{...pr,supply_notes:(pr.supply_notes||[]).filter(n=>n.id!==nid)}:pr);
    await save();render();currentPid=pid;renderPM();
  };
  window._prClearHist=async(pid)=>{
    const now2=new Date();
    const currIds=new Set(S.assigns.filter(a=>{const s=new Date(a.start_date),e=a.end_date?new Date(a.end_date):null;return a.profile_id===pid&&s<=now2&&(!e||e>=now2)&&!a.is_forecast;}).map(a=>a.id));
    S.profiles=S.profiles.map(pr=>pr.id===pid?{...pr,supply_notes:(pr.supply_notes||[]).filter(n=>currIds.has(n.assignment_id))}:pr);
    await save();render();currentPid=pid;renderPM();
  };
  window._LN=LN;
  if(modalEditMode){
    if(modalTabState==="general"||modalTabState==="skills"){rskl(modalTabState==="skills");}
    const pl=document.getElementById("pl");if(pl)pl.addEventListener("input",updLL);
    updLL();
  }
}

// ── HISTORY TAB ───────────────────────────────────────────────────────────
function histTab(p){
  const all=S.assigns.filter(a=>a.profile_id===p.id).sort((a,b)=>new Date(b.start_date)-new Date(a.start_date));
  const now=new Date();
  const active=all.filter(a=>{const s=new Date(a.start_date),e=a.end_date?new Date(a.end_date):null;return s<=now&&(!e||e>=now)});
  const past=all.filter(a=>a.end_date&&new Date(a.end_date)<now);
  const future=all.filter(a=>new Date(a.start_date)>now);
  const row=(a,col)=>`<div class="hist-item"><div class="hist-dot" style="background:${col}"></div><div style="flex:1"><div style="font-weight:500;font-size:13px">${a.project_name}</div><div style="font-size:11px;color:var(--t3);margin-top:2px">${fds(a.start_date)} → ${fds(a.end_date)} · ${a.chargeability}%${a.is_forecast?' <span style="color:var(--acc);font-size:10px">PREV</span>':""}</div></div></div>`;
  return`<div>
    ${active.length?`<div class="sect-lbl">Activo ahora</div>${active.map(a=>row(a,"var(--green)")).join("")}`:""}
    ${future.length?`<div class="sect-lbl" style="margin-top:16px">Próximas</div>${future.map(a=>row(a,"var(--acc)")).join("")}`:""}
    ${past.length?`<div class="sect-lbl" style="margin-top:16px">Historial</div>${past.map(a=>row(a,"var(--t3)")).join("")}`:""}
    ${!all.length?`<div class="empty" style="padding:24px">Sin asignaciones registradas.</div>`:""}
  </div>`;}

// ── HELPERS MODAL ─────────────────────────────────────────────────────────
function updRoleDd(cap){const sel=document.getElementById("prol");if(!sel)return;const cur=sel.value;sel.innerHTML=`<option value="">Seleccionar...</option>${rolesForCap(cap).map(r=>`<option${r===cur?" selected":""}>${r}</option>`).join("")}<option value="__new__">+ Nuevo rol...</option>`;}
function selTgg(gid,btn){document.querySelectorAll(`#${gid} .tgb`).forEach(b=>b.classList.remove("on"));btn.classList.add("on");}
function tNR(v){document.getElementById("nrw").style.display=v==="__new__"?"block":"none";}
async function addNR(){const inp=document.getElementById("nri");const val=inp.value.trim();if(!val)return;const cap=document.getElementById("pcap")?.value||"";if(!S.customRoles.find(r=>r.name===val))S.customRoles.push({name:val,cap});await save();const sel=document.getElementById("prol");const opt=document.createElement("option");opt.value=val;opt.textContent=val;opt.selected=true;sel.insertBefore(opt,sel.querySelector("option[value='__new__']"));inp.value="";document.getElementById("nrw").style.display="none";}
function updLL(){const v=parseFloat(document.getElementById("pl")?.value)||0;const l=document.getElementById("ll");if(l)l.textContent=v>0?`≈ ${(v*6).toFixed(0)}€/día · ${(v*30).toFixed(0)}€/sem`:"";}
function adjLCR(d){const i=document.getElementById("pl");i.value=(Math.max(0,(parseFloat(i.value)||0)+d)).toFixed(2);updLL();}
function rskl(editable=true){const sl=document.getElementById("skl");if(!sl)return;const sc=document.getElementById("skc");if(sc)sc.textContent=editSkills.length+" activos";
  const hard=editSkills.filter((sk,idx)=>({...sk,_i:idx})||true).map((sk,i)=>({...sk,_i:i})).filter(sk=>skType(sk)==="hard");
  const soft=editSkills.map((sk,i)=>({...sk,_i:i})).filter(sk=>skType(sk)==="soft");
  const allWithIdx=editSkills.map((sk,i)=>({...sk,_i:i}));
  const skRow=(sk,i)=>`<div class="sdk"><span style="flex:1;font-size:13px">${sk.name}</span><span onclick="toggleSkT(${i})" style="font-size:10px;padding:2px 6px;border-radius:3px;cursor:pointer;${skType(sk)==="soft"?"background:var(--accbg);color:var(--acc)":"background:rgba(255,255,255,0.06);color:var(--t3)"}">${skType(sk)==="soft"?"Soft":"Hard"}</span><span style="font-size:11px;color:var(--t3);width:55px;text-align:right">${SLVL[sk.level]||""}</span><div style="display:flex;gap:4px">${[1,2,3,4,5].map(n=>`<div class="sdot${sk.level>=n?" on":""}${editable?" click":""}" ${editable?`onclick="setSL(${i},${n})"`:""} style="${editable?"cursor:pointer":""}"></div>`).join("")}</div>${editable?`<button onclick="delSk(${i})" style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:18px;line-height:1;padding-left:4px">×</button>`:""}</div>`;
  if(editable){
    sl.innerHTML=allWithIdx.map((sk,i)=>skRow(sk,i)).join("");
  } else {
    const hRows=allWithIdx.filter(sk=>skType(sk)==="hard");const sRows=allWithIdx.filter(sk=>skType(sk)==="soft");
    sl.innerHTML=(hRows.length?`<div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Hard</div>${hRows.map((sk,i)=>skRow(sk,sk._i)).join("")}`:"")+(sRows.length?`<div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;margin-top:10px">Soft</div>${sRows.map((sk,i)=>skRow(sk,sk._i)).join("")}`:"");
  }
}
function toggleSkT(i){editSkills[i].type=skType(editSkills[i])==="soft"?"hard":"soft";rskl();}
function addSk(){const i=document.getElementById("nsk");if(!i.value.trim())return;editSkills.push({name:i.value.trim(),level:3});i.value="";rskl();}
function delSk(i){editSkills.splice(i,1);rskl();}
function setSL(i,l){editSkills[i].level=l;rskl();}


function asigTab(p){
  const now=new Date();
  const isActive=a=>{const s=new Date(a.start_date),e=a.end_date?new Date(a.end_date):null;return a.profile_id===p.id&&s<=now&&(!e||e>=now)&&!a.is_forecast;};
  const activeA=S.assigns.filter(isActive).sort((a,b)=>b.chargeability-a.chargeability);
  const currIds=new Set(activeA.map(a=>a.id));
  const risk=getRisk(p.id);
  const notes=(p.supply_notes||[]).slice().reverse();
  const currNotes=notes.filter(n=>currIds.has(n.assignment_id));
  const pastNotes=notes.filter(n=>!currIds.has(n.assignment_id));

  // Assignment summary
  const assignSum=activeA.length===0
    ?`<div style="color:var(--t3);font-size:12px;padding:8px 0 16px">Sin asignación activa.</div>`
    :activeA.map(a=>`<div style="display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--b)"><div style="flex:1"><div style="font-weight:500;font-size:13px">${a.project_name}</div><div style="font-size:11px;color:var(--t3);margin-top:2px">${fds(a.start_date)} → ${fds(a.end_date)} <span class="bdg ${a.chargeability>=80?"bgreen":a.chargeability>=40?"bamber":"bg"}" style="font-size:11px;margin-left:4px">${a.chargeability}%</span>${a.is_forecast?` <span style="font-size:10px;color:var(--acc)">PREV</span>`:""}</div></div></div>`).join("");

  // Risk section
  const rBtns=["low","mid","high"].map(r=>`<button class="tgb${(p.risk_override||risk)===r?" on":""}" onclick="window._prRisk('${p.id}','${r}')">${r==="low"?"Low":r==="mid"?"Mid":"High"}</button>`).join("")+`<button class="tgb${!p.risk_override?" on":""}" onclick="window._prRisk('${p.id}','auto')">Auto</button>`;

  // Note renderer
  const noteRow=n=>`<div style="padding:10px 0;border-bottom:1px solid var(--b)"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px"><div style="flex:1"><div style="font-size:12px;line-height:1.5">${n.text}</div><div style="font-size:10px;color:var(--t3);margin-top:4px">${new Date(n.ts).toLocaleDateString("es-ES",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"})} · ${n.project}</div></div><button onclick="window._prDelNote('${p.id}','${n.id}')" style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;line-height:1;flex-shrink:0">×</button></div></div>`;

  return`<div>
    <div class="sect-lbl">Asignación actual</div>
    ${assignSum}
    <div class="fld" style="margin-top:16px">
      <label>Riesgo</label>
      <div class="tgg">${rBtns}</div>
      <div style="font-size:11px;color:var(--t3);margin-top:5px">Auto: Low &lt;15d · Mid 15–30d · High &gt;30d</div>
    </div>
    <div class="fld">
      <label>Notas <span style="font-size:10px;color:var(--t3);font-weight:400;text-transform:none;letter-spacing:0">(vinculadas a la asignación activa)</span></label>
      ${currNotes.length===0?`<div style="color:var(--t3);font-size:12px;padding:4px 0 8px">Sin notas para esta asignación.</div>`:""}
      ${currNotes.map(noteRow).join("")}
      <div style="display:flex;gap:8px;margin-top:12px">
        <textarea id="pr-note-inp" class="fi" style="flex:1;min-height:60px;resize:vertical" placeholder="Añadir nota..."></textarea>
        <button class="btn btns btnp" style="align-self:flex-end;white-space:nowrap" onclick="window._prAddNote('${p.id}')">+ Añadir</button>
      </div>
    </div>
    ${pastNotes.length>0?`<div style="border-top:1px solid var(--b);margin-top:8px;padding-top:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em">Historial de notas (${pastNotes.length})</div>
        <button class="btn btns" style="font-size:11px;color:var(--red);border-color:rgba(239,68,68,0.3)" onclick="window._prClearHist('${p.id}')">Limpiar historial</button>
      </div>
      <div style="opacity:.7">${pastNotes.map(noteRow).join("")}</div>
    </div>`:""}
  </div>`;
}

async function _prSaveAndRefresh(pid){await save();render();currentPid=pid;renderPM();}

async function saveBaja(id){
  const getType=()=>{const b=document.querySelector("#tgg-btype .tgb.on");return b?b.textContent:"Enfermedad"};
  const data={profile_id:document.getElementById("bm-pid").value,type:getType(),desde:document.getElementById("bm-desde").value,hasta:document.getElementById("bm-hasta").value||null,comments:document.getElementById("bm-cm").value};

}
async function delBaja(id){S.bajas=S.bajas.filter(b=>b.id!==id);await save();cm();render();}


// ── DEMAND MODAL ──────────────────────────────────────────────────────────
function openDM(id){
  const d=id?S.demands.find(x=>x.id===id):null;
  let noteIdx=0; // 0 = most recent

  function buildHTML(){
    const notesRev=(d&&d.notes||[]).slice().reverse();
    const total=notesRev.length;
    noteIdx=Math.max(0,Math.min(noteIdx,total-1));

    // Profile dropdown: bench first, then assigned
    const benchP=S.profiles.filter(p=>p.is_active&&pCharge(p.id)===0).sort((a,b)=>a.name.localeCompare(b.name));
    const assignedP=S.profiles.filter(p=>p.is_active&&pCharge(p.id)>0).sort((a,b)=>a.name.localeCompare(b.name));
    let ppOpts=`<option value="">Sin propuesta</option>`;
    if(benchP.length){
      ppOpts+=`<optgroup label="Disponibles (sin asignación)">`;
      ppOpts+=benchP.map(p=>`<option value="${p.name}"${d&&d.proposed_profile===p.name?" selected":""}>${p.name} · ${p.role||""} · ${p.level_accenture||""}</option>`).join("");
      ppOpts+=`</optgroup>`;
    }
    if(assignedP.length){
      ppOpts+=`<optgroup label="Perfiles asignados">`;
      ppOpts+=assignedP.map(p=>`<option value="${p.name}"${d&&d.proposed_profile===p.name?" selected":""}>${p.name} · ${p.role||""} · ${p.level_accenture||""} (${pCharge(p.id)}%)</option>`).join("");
      ppOpts+=`</optgroup>`;
    }

    // Note navigator
    let noteHTML="";
    if(total===0){
      noteHTML=`<div style="color:var(--t3);font-size:12px;padding:8px 0 4px">Sin comentarios aún.</div>`;
    } else {
      const n=notesRev[noteIdx];
      const ts=new Date(n.ts).toLocaleDateString("es-ES",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});
      noteHTML=`<div style="background:var(--bg2);border:1px solid var(--b);border-radius:8px;overflow:hidden;margin-bottom:4px">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--b)">
          <button onclick="window._dmNav(${noteIdx+1})" ${noteIdx>=total-1?"disabled":""} style="background:none;border:none;cursor:pointer;color:${noteIdx>=total-1?"var(--t3)":"var(--t2)"};font-size:20px;line-height:1;padding:0 6px 2px">‹</button>
          <span style="font-size:11px;color:var(--t3)">${noteIdx+1} / ${total}</span>
          <button onclick="window._dmNav(${noteIdx-1})" ${noteIdx<=0?"disabled":""} style="background:none;border:none;cursor:pointer;color:${noteIdx<=0?"var(--t3)":"var(--t2)"};font-size:20px;line-height:1;padding:0 6px 2px">›</button>
        </div>
        <div style="padding:12px">
          <div style="font-size:13px;line-height:1.6;color:var(--t)">${n.text}</div>
          <div style="font-size:10px;color:var(--t3);margin-top:8px;display:flex;justify-content:space-between;align-items:center">
            <span>${ts}</span>
            <button onclick="window._dmDelNote('${n.id}')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:11px;opacity:.7;padding:0">Eliminar</button>
          </div>
        </div>
      </div>`;
    }

    const stBtns=STATUSES.map(s=>`<button class="tgb${(d?d.status:"Vacío")===s?" on":""}" onclick="selTgg('tgg-dst',this)">${s}</button>`).join("");
    const ctBtns=CONTRACT_TYPES.map(t=>`<button class="tgb${(d?d.contract_type:"Interno")===t?" on":""}" onclick="selTgg('tgg-dct',this)">${t}</button>`).join("");

    return `<div class="ov" id="dmov" onclick="if(event.target.id==='dmov')cm()">
    <div class="modal" style="max-width:560px">
      <div class="mhdr">
        <div><div style="font-weight:500;font-size:15px">${d?d.client+" — "+d.project_reference:"Nueva petición"}</div>${d?`<span class="bdg ${scol(d.status)}" style="margin-top:4px;display:inline-block">${d.status}</span>`:""}</div>
        <button onclick="cm()" style="background:none;border:none;color:var(--t2);cursor:pointer;font-size:22px;line-height:1">×</button>
      </div>
      <div class="mbdy" style="padding-top:16px;max-height:70vh;overflow-y:auto">
        <div class="r2">
          <div class="fld"><label>Cliente</label><input id="dm-cli" class="fi" value="${d?d.client||"":""}" placeholder="Ej: Coca-Cola"/></div>
          <div class="fld"><label>Proyecto</label><input id="dm-proj" class="fi" value="${d?d.project_reference||"":""}" placeholder="Ej: Q4 Campaign"/></div>
        </div>
        <div class="r2">
          <div class="fld"><label>Fecha inicio</label><input type="date" id="dm-start" class="fi" value="${d?d.start_date||"":""}"/></div>
          <div class="fld"><label>Duración (semanas)</label><input type="number" id="dm-dur" class="fi" value="${d?d.duration_weeks||"":""}" min="1" placeholder="Ej: 12"/></div>
        </div>
        <div class="r2">
          <div class="fld"><label>Capability</label><select id="dm-cap" class="fi">${CAPS.map(cp=>`<option${d&&d.capability===cp?" selected":""}>${cp}</option>`).join("")}</select></div>
          <div class="fld"><label>Rol</label><select id="dm-role" class="fi"><option value="">Seleccionar...</option>${[...new Set(Object.values(ROLES_BY_CAP).flat())].sort().map(r=>`<option${d&&d.role===r?" selected":""}>${r}</option>`).join("")}</select></div>
        </div>
        <div class="r2">
          <div class="fld"><label>Seniority</label><select id="dm-sen" class="fi">${SENIORITY.map(s=>`<option${d&&d.seniority===s?" selected":""}>${s}</option>`).join("")}</select></div>
          <div class="fld"><label>Cargabilidad — <span id="dm-clbl">${d?d.chargeability_required||100:100}%</span></label><input type="range" id="dm-ch" min="0" max="100" step="5" value="${d?d.chargeability_required||100:100}" oninput="document.getElementById('dm-clbl').textContent=this.value+'%'"/></div>
        </div>
        <div class="fld"><label>Tipo de contrato</label><div class="tgg" id="tgg-dct">${ctBtns}</div></div>
        <div class="fld"><label>Estado</label><div class="tgg" id="tgg-dst">${stBtns}</div></div>
        <div class="fld">
          <label>Perfil propuesto</label>
          <select id="dm-pp" class="fi">${ppOpts}</select>
          <div style="font-size:11px;color:var(--t3);margin-top:4px">Los perfiles disponibles aparecen primero. Los asignados pueden sobreescribirse.</div>
        </div>
        <div style="border-top:1px solid var(--b);margin-top:4px;padding-top:18px">
          <div class="sect-lbl" style="margin-bottom:12px">Comentarios</div>
          ${noteHTML}
          <div style="display:flex;gap:8px;margin-top:10px">
            <textarea id="dm-note-inp" class="fi" style="flex:1;min-height:52px;resize:vertical" placeholder="Añadir comentario..."></textarea>
            <button class="btn btns btnp" style="align-self:flex-end;white-space:nowrap" onclick="window._dmAddNote()">+ Añadir</button>
          </div>
        </div>
      </div>
      <div class="mftr">
        ${id?`<button class="btn btns btnd" onclick="window._dmDel()">Eliminar</button>`:""}
        <div style="flex:1"></div>
        <button class="btn btns" onclick="cm()">Cancelar</button>
        <button class="btn btnp btns" onclick="window._dmSave()">Guardar</button>
      </div>
    </div></div>`;
  }

  function render2(){
    document.getElementById("mroot").innerHTML=buildHTML();
    window._dmNav=(i)=>{noteIdx=i;render2();};
    window._dmSave=async()=>{
      const getT=gid=>{const b=document.querySelector("#"+gid+" .tgb.on");return b?b.textContent:"";};
      const data={client:document.getElementById("dm-cli").value,project_reference:document.getElementById("dm-proj").value,start_date:document.getElementById("dm-start").value||null,duration_weeks:parseInt(document.getElementById("dm-dur").value)||null,capability:document.getElementById("dm-cap").value,role:document.getElementById("dm-role").value,seniority:document.getElementById("dm-sen").value,chargeability_required:parseInt(document.getElementById("dm-ch").value)||100,contract_type:getT("tgg-dct")||"Interno",status:getT("tgg-dst")||"Vacío",proposed_profile:document.getElementById("dm-pp").value};
      if(!data.client||!data.role)return;
      if(id){S.demands=S.demands.map(d=>d.id===id?{...d,...data}:d);}
      else{S.demands.push({...data,id:uid(),notes:[],created_at:new Date().toISOString()});}
      await save();cm();render();
    };
    window._dmDel=async()=>{S.demands=S.demands.filter(d=>d.id!==id);await save();cm();render();};
    window._dmAddNote=async()=>{
      const txt=document.getElementById("dm-note-inp")?.value?.trim();if(!txt)return;
      const note={id:uid(),ts:new Date().toISOString(),text:txt};
      if(id){S.demands=S.demands.map(d=>d.id===id?{...d,notes:[...(d.notes||[]),note]}:d);}
      noteIdx=0; // jump to newest
      await save();render();render2();
    };
    window._dmDelNote=async(nid)=>{
      if(id){S.demands=S.demands.map(d=>d.id===id?{...d,notes:(d.notes||[]).filter(n=>n.id!==nid)}:d);}
      const remaining=(S.demands.find(d=>d.id===id)?.notes||[]).length;
      noteIdx=Math.max(0,Math.min(noteIdx,remaining-1));
      await save();render();render2();
    };
  }
  render2();
}



// ── ASSIGN MODAL ──────────────────────────────────────────────────────────
function openAM(pid){const profile=S.profiles.find(p=>p.id===pid);const asgns=S.assigns.filter(a=>a.profile_id===pid).sort((a,b)=>new Date(b.start_date)-new Date(a.start_date));document.getElementById("mroot").innerHTML=`<div class="ov" id="aov" onclick="if(event.target.id==='aov')cm()"><div class="modal" style="max-width:540px"><div class="mhdr"><div style="display:flex;align-items:center;gap:12px"><div class="av">${ini(profile.name)}</div><div><div style="font-weight:500;font-size:15px">${profile.name}</div><div style="font-size:11px;color:var(--t3)">Gestión de asignaciones</div></div></div><button onclick="cm()" style="background:none;border:none;color:var(--t2);cursor:pointer;font-size:22px;line-height:1">×</button></div><div class="mbdy" style="padding-top:16px">${asgns.length>0?`<div style="margin-bottom:22px"><div class="sect-lbl">Asignaciones (${asgns.length})</div>${asgns.map(a=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--b)"><div style="flex:1"><div style="display:flex;align-items:center;gap:6px">${a.is_forecast?`<span style="font-size:10px;color:var(--acc)">PREV</span>`:""}<span style="font-weight:500">${a.project_name}</span><span class="bdg ${a.chargeability>=80?"bgreen":a.chargeability>=40?"bamber":"bg"}" style="font-size:11px">${a.chargeability}%</span></div><div style="font-size:11px;color:var(--t3);margin-top:2px">${fds(a.start_date)} → ${fds(a.end_date)}</div></div><button class="btn btns btnd" onclick="delA('${a.id}','${pid}')">×</button></div>`).join("")}</div>`:""}<div class="sect-lbl">Nueva asignación</div><div class="fld"><label>Proyecto</label><input id="ap" class="fi" placeholder="Ej: Meta · Q3 Campaign"/></div><div class="r2"><div class="fld"><label>Fecha inicio</label><input type="date" id="as" class="fi"/></div><div class="fld"><label>Fecha fin</label><input type="date" id="ae" class="fi"/></div></div><div class="fld"><label>Cargabilidad — <span id="aclbl">100%</span></label><input type="range" id="ach" min="0" max="100" step="5" value="100" oninput="document.getElementById('aclbl').textContent=this.value+'%'"/></div><div class="fld"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;text-transform:none;letter-spacing:0;font-size:13px;color:var(--t2);font-weight:400"><input type="checkbox" id="afc"/> Marcar como previsión</label></div><div class="fld"><label>Notas</label><textarea id="ano" class="fi" style="min-height:55px" placeholder="Contexto..."></textarea></div></div><div class="mftr"><div style="flex:1"></div><button class="btn btns" onclick="cm()">Cerrar</button><button class="btn btnp btns" onclick="saveA('${pid}')">Añadir</button></div></div></div>`;}
async function saveA(pid){const data={profile_id:pid,project_name:document.getElementById("ap").value,start_date:document.getElementById("as").value,end_date:document.getElementById("ae").value||null,chargeability:parseInt(document.getElementById("ach").value)||100,is_forecast:document.getElementById("afc").checked,notes:document.getElementById("ano").value,id:uid(),created_at:new Date().toISOString()};if(!data.project_name||!data.start_date)return;S.assigns.push(data);await save();cm();render();}
async function delA(id,pid){S.assigns=S.assigns.filter(a=>a.id!==id);await save();openAM(pid);}
function cm(){document.getElementById("mroot").innerHTML="";}


// Tab navigation via postMessage (from platform iframe parent)
window.addEventListener('message',function(e){
  if(!e.data||!e.data.tab)return;
  var t=e.data.tab;
  if(['roster','supply','demand','dashboard'].includes(t)){
    S.tab=t;
    document.querySelectorAll('.tab').forEach(function(x){x.classList.toggle('on',x.dataset.tab===t);});
    render();
  }
});

showGate();
</script>
